site_name: "Nubenetes V2 | The AI's Cut"
site_url: "https://nubenetes.com/v2/"
site_description: "Enterprise-grade curated portal for the modern Cloud Native ecosystem. High-density, AI-driven selection of top-tier resources."
site_author: "Nubenetes"
copyright: "Copyright &copy; 2026 Nubenetes Agentic Intelligence"
docs_dir: v2-docs
use_directory_urls: true

repo_name: "nubenetes/awesome-kubernetes"
repo_url: "https://github.com/nubenetes/awesome-kubernetes"
edit_uri: "edit/master/v2-docs/"

theme:
  name: material
  language: en
  favicon: images/favicon-ultra.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/shield
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/shield-moon-outline
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.view
    - content.action.edit
    - content.tooltips
    - navigation.prune
    - toc.integrate

  plugins:
  - search
  - privacy
  - social:
      cards: true
      cards_layout_options:
        background_color: "#263238"
        font_family: "Inter"
      custom_dir: "docs/images/"
      logo: favicon-ultra.png
  - redirects:
      redirect_maps: {}

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nubenetes/awesome-kubernetes
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/nubenetes
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/groups/1937212/
  version:
    provider: mike # Ready for version switching

extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap
  - static/extra.css
  - static/v2_elite.css?v=2.3.44

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark

