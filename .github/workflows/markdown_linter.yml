name: Nubenetes Markdown Linter

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches:
      - develop
    paths:
      - '**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli2

      - name: Run Markdown Linter
        run: |
          # We only lint files in docs/ and v2-docs/ and README.md
          # but we ignore long line length rule (MD013) because links are long
          echo '{ "MD013": false, "MD033": false, "MD041": false }' > .markdownlint.json
          markdownlint-cli2 "docs/**/*.md" "v2-docs/**/*.md" "README.md"
