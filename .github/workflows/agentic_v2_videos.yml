name: Nubenetes V2 Video Hub Builder

on:
  push:
    branches:
      - develop
    paths:
      - 'src/v2_video_portal.py'
      - 'src/enrich_videos.py'
      - 'data/inventory.yaml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v2-video-hub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-video-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Synchronization
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Python 3.11 Environment Provisioning
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependency Installation
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml httpx tenacity pytz python-dotenv

      - name: Execute Video Hub Enrichment
        env:
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          python src/enrich_videos.py

      - name: Execute Video Portal Generator
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python src/v2_video_portal.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Nubenetes Bot"
          git config --global user.email "bot@nubenetes.com"
          git add v2-docs/videos.md data/inventory.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: automated V2 video hub update [skip ci]"
            git pull --rebase origin develop
            git push origin develop
          fi
