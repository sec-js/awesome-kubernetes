name: Nubenetes V2 Video Hub Builder

on:
  push:
    branches:
      - develop
    paths:
      - 'src/v2_video_portal.py'
      - 'src/enrich_videos.py'
      - 'data/inventory.yaml'
  workflow_dispatch:
    inputs:
      restore_cache:
        description: 'Restore inventory from cache (Warning: May overwrite recent manual changes)'
        required: false
        type: boolean
        default: false
      force_enrich:
        description: 'Force AI re-enrichment of all videos (ignores cache)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: v2-video-hub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-video-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Synchronization
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Python 3.11 Environment Provisioning
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore Incremental Inventory Cache
        if: ${{ github.event.inputs.restore_cache == 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: data/inventory.yaml
          key: inventory-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            inventory-v2-

      - name: Dependency Installation
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml httpx tenacity pytz python-dotenv yt-dlp youtube-transcript-api

      - name: Execute Video Hub Enrichment
        env:
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          FORCE_ENRICH: ${{ github.event.inputs.force_enrich || 'false' }}
        run: |
          python src/enrich_videos.py

      - name: Execute Video Portal Generator
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python src/v2_video_portal.py

      - name: Create Pull Request for Video Hub Update
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/v2-video-sync
          base: develop
          title: "V2 Content: Video Hub Enrichment Sync"
          commit-message: "docs: update Video Hub with high-fidelity metadata [skip ci]"
          labels: "v2-content, video-hub"
          body: |
            Automated update of the V2 Video Hub.
            - Robust metadata extraction (yt-dlp + transcripts)
            - AI-synthesized technical summaries
            - Format-compliant Markdown rendering

      - name: Persist Incremental Inventory Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/inventory.yaml
          key: inventory-v2-${{ github.run_id }}-${{ github.run_attempt }}
